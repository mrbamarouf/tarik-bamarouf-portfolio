<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tarik Bamarouf Portfolio</title>
    <meta
      name="description"
      content="Tarik Bamarouf portfolio preview. This temporary HTML file opens the current live portfolio while the custom domain is being prepared."
    />
    <link rel="canonical" href="https://tarik-bamarouf-portfolio-delta.vercel.app/" />
    <style>
      :root {
        color-scheme: dark;
        --background: #020201;
        --foreground: #f6ecd9;
        --muted: rgba(246, 236, 217, 0.68);
        --bronze: #d3b98a;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: var(--background);
        color: var(--foreground);
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      .portfolio-frame {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        border: 0;
        background: var(--background);
      }

      .fallback {
        position: fixed;
        inset: 0;
        z-index: 2;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at 50% 20%, rgba(211, 185, 138, 0.18), transparent 34%),
          var(--background);
        text-align: center;
        transition: opacity 420ms ease, visibility 420ms ease;
      }

      .fallback.is-hidden {
        visibility: hidden;
        opacity: 0;
        pointer-events: none;
      }

      .fallback__inner {
        max-width: 520px;
      }

      .fallback__title {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(2rem, 8vw, 4.8rem);
        font-weight: 300;
        line-height: 0.95;
      }

      .fallback__copy {
        margin: 18px auto 0;
        max-width: 34rem;
        color: var(--muted);
        font-size: 0.95rem;
        line-height: 1.7;
      }

      .fallback__link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 46px;
        margin-top: 28px;
        padding: 0 22px;
        border: 1px solid var(--bronze);
        color: #070604;
        background: var(--bronze);
        text-decoration: none;
        font-size: 0.72rem;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .fallback__hint {
        margin-top: 18px;
        color: rgba(246, 236, 217, 0.42);
        font-size: 0.72rem;
        line-height: 1.6;
      }

      .fallback__contact {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px 18px;
        margin-top: 22px;
        color: var(--muted);
        font-size: 0.82rem;
        line-height: 1.6;
      }

      .fallback__contact a {
        color: var(--foreground);
        text-decoration-color: rgba(211, 185, 138, 0.54);
        text-underline-offset: 4px;
      }

      @media (prefers-reduced-motion: reduce) {
        .fallback {
          transition: none;
        }
      }
    </style>
  </head>
  <body>
    <iframe
      id="portfolioFrame"
      class="portfolio-frame"
      title="Tarik Bamarouf Portfolio"
      src="https://tarik-bamarouf-portfolio-delta.vercel.app/"
      allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
      referrerpolicy="no-referrer-when-downgrade"
    ></iframe>

    <main id="fallback" class="fallback" aria-live="polite">
      <div class="fallback__inner">
        <h1 class="fallback__title">Tarik Bamarouf</h1>
        <p class="fallback__copy">
          Loading the current portfolio preview. If it does not appear automatically, open the live
          preview directly.
        </p>
        <a class="fallback__link" href="https://tarik-bamarouf-portfolio-delta.vercel.app/">
          Open Portfolio
        </a>
        <div class="fallback__contact" aria-label="Direct contact">
          <a href="https://wa.me/966503938398">WhatsApp: 0503938398</a>
          <a href="mailto:tarikbamarouf@gmail.com">tarikbamarouf@gmail.com</a>
        </div>
        <p class="fallback__hint">
          Temporary preview file for sharing before the custom domain is connected.
        </p>
      </div>
    </main>

    <script>
      const frame = document.getElementById("portfolioFrame");
      const fallback = document.getElementById("fallback");

      frame.addEventListener("load", () => {
        window.setTimeout(() => {
          fallback.classList.add("is-hidden");
        }, 500);
      });
    </script>
  </body>
</html>
